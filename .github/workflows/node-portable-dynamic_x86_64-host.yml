name: Build Node.js Portable Dynamic (Musl)
on:
  workflow_dispatch:
jobs:
  build-node-musl:
    runs-on: ubuntu-latest
    timeout-minutes: 380
    env:
      NODE_VERSION: "v24.15.0"
      TARGET_ARCH: "arm"
      TOOLCHAIN_TRIPLE: "arm-linux-musleabihf"
      RAMDISK_PATH: "/mnt/ramdisk"
      CCACHE_DIR: "/home/runner/.ccache"
      CACHE_DL_DIR: "/home/runner/downloads"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.CCACHE_DIR }}
            ${{ env.CACHE_DL_DIR }}
          key: ${{ runner.os }}-node-portable-dynamic-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node-portable-dynamic-cache-

      - run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3 make cmake git curl wget xz-utils binutils gcc g++ gcc-multilib g++-multilib pkg-config patch ccache mold unzip
          mkdir -p $CACHE_DL_DIR

      - run: |
          sudo mkdir -p $RAMDISK_PATH
          sudo mount -t tmpfs -o size=10G tmpfs $RAMDISK_PATH
          sudo chown -R $USER:$USER $RAMDISK_PATH

      - working-directory: ${{ env.RAMDISK_PATH }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f "$CACHE_DL_DIR/toolchain.tar.xz" ]; then
            gh release download -p "custom-arm-toolchain-x86_64.tar.xz" -R ${{ github.repository }} -O $CACHE_DL_DIR/toolchain.tar.xz
          fi
          sudo tar -xf $CACHE_DL_DIR/toolchain.tar.xz -C /opt
          sudo mv /opt/custom-toolchain /opt/musl-toolchain

      - working-directory: ${{ env.RAMDISK_PATH }}
        run: |
          if [ ! -f "$CACHE_DL_DIR/node.tar.gz" ]; then
            wget -qO $CACHE_DL_DIR/node.tar.gz https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}.tar.gz
          fi
          tar -xf $CACHE_DL_DIR/node.tar.gz
          mv node-${NODE_VERSION} node-src

      - working-directory: ${{ env.RAMDISK_PATH }}/node-src
        run: |
          RAND_FILE=$(find deps/openssl -name "rand_unix.c" | head -n 1)
          if [ -n "$RAND_FILE" ]; then
            sed -i 's/define OPENSSL_RAND_SEED_GETRANDOM/undef OPENSSL_RAND_SEED_GETRANDOM/g' "$RAND_FILE"
            sed -i 's/define OPENSSL_RAND_SEED_OS/define OPENSSL_RAND_SEED_DEVRANDOM/g' "$RAND_FILE"
          else
            find deps/openssl -type f -name "*.c" -exec grep -l "OPENSSL_RAND_SEED_GETRANDOM" {} + | xargs -I {} sed -i 's/define OPENSSL_RAND_SEED_GETRANDOM/undef OPENSSL_RAND_SEED_GETRANDOM/g' {}
            find deps/openssl -type f -name "*.c" -exec grep -l "OPENSSL_RAND_SEED_OS" {} + | xargs -I {} sed -i 's/define OPENSSL_RAND_SEED_OS/define OPENSSL_RAND_SEED_DEVRANDOM/g' {}
          fi
          
          python3 -c "
          import sys
          filepath_handles = 'deps/v8/src/handles/handles.h'
          try:
              with open(filepath_handles, 'r') as f: content = f.read()
              content = content.replace('static_assert(HandleScopeData::kSizeInBytes == sizeof(HandleScopeData));', '')
              target1 = 'This handle does not reference a heap object'
              idx1 = content.find(target1)
              if idx1 != -1:
                  start_idx = content.rfind('static_assert', 0, idx1)
                  end_idx = content.find(';', idx1) + 1
                  if start_idx != -1 and end_idx != -1:
                      content = content[:start_idx] + content[end_idx:]
              with open(filepath_handles, 'w') as f: f.write(content)
          except Exception: pass
          
          filepath_turbo = 'deps/v8/src/compiler/turboshaft/int64-lowering-reducer.h'
          try:
              with open(filepath_turbo, 'r') as f: content_turbo = f.read()
              content_turbo = content_turbo.replace('__ Tuple<Word32, Word32>', '__ template Tuple<Word32, Word32>')
              with open(filepath_turbo, 'w') as f: f.write(content_turbo)
          except Exception: pass
          "

      - working-directory: ${{ env.RAMDISK_PATH }}/node-src
        run: |
          export PATH="/opt/musl-toolchain/bin:$PATH"
          export CC="ccache /opt/musl-toolchain/bin/${TOOLCHAIN_TRIPLE}-gcc"
          export CXX="ccache /opt/musl-toolchain/bin/${TOOLCHAIN_TRIPLE}-g++"
          export AR="/opt/musl-toolchain/bin/${TOOLCHAIN_TRIPLE}-ar"
          export NM="/opt/musl-toolchain/bin/${TOOLCHAIN_TRIPLE}-nm"
          export STRIP="/opt/musl-toolchain/bin/${TOOLCHAIN_TRIPLE}-strip"
          export LINK="$CXX" 
          
          export CC_host="gcc -m32"
          export CXX_host="g++ -m32"
          export LINK_host="g++ -m32"
          export AR_host="ar"
          export NM_host="nm"
          export host_os="linux"
          
          export GYP_DEFINES="host_os=linux host_arch=ia32 target_arch=arm v8_enable_sandbox=0 v8_enable_maglev=0 v8_enable_pointer_compression=0 v8_use_snapshot=false v8_enable_lite_mode=1 v8_enable_gdbjit=0 v8_enable_test_features=0 v8_enable_vtunejit=0 v8_enable_system_instrumentation=0 v8_enable_trace_maps=0 v8_enable_trace_ignition=0 v8_enable_etw=0 v8_enable_native_counters=0 v8_enable_inspector=0 node_has_winsdk=0 node_use_etw=0 node_use_perfctr=0 node_use_dtrace=0"
          
          export BYPASS_FLAGS="-D_LIBCPP_HAS_NO_OFF_T_FUNCTIONS -DUV_EXCLUDE_IO_URING=1 -w"
          export CFLAGS="-Os -fdata-sections -ffunction-sections -pipe -g0 $BYPASS_FLAGS"
          export CXXFLAGS="-Os -fdata-sections -ffunction-sections -std=gnu++20 -pipe -g0 $BYPASS_FLAGS"
          export LDFLAGS="-static-libstdc++ -static-libgcc -Wl,--export-dynamic -Wl,--gc-sections"
          
          ./configure \
            --dest-cpu=$TARGET_ARCH \
            --dest-os=linux \
            --cross-compiling \
            --with-intl=small-icu \
            --without-npm \
            --without-corepack \
            --without-inspector \
            --without-report \
            --without-node-code-cache \
            --without-node-snapshot \
            --openssl-no-asm

      - working-directory: ${{ env.RAMDISK_PATH }}/node-src
        run: |
          export PATH="/opt/musl-toolchain/bin:$PATH"
          mold -s -run make -j2 BUILDTYPE=Release > /dev/null

      - working-directory: ${{ env.RAMDISK_PATH }}/node-src
        run: |
          /opt/musl-toolchain/bin/${TOOLCHAIN_TRIPLE}-strip --strip-all out/Release/node
          cp /opt/musl-toolchain/${TOOLCHAIN_TRIPLE}/lib/libc.so out/Release/ld-musl-armhf.so.1
          /opt/musl-toolchain/bin/${TOOLCHAIN_TRIPLE}-strip --strip-all out/Release/ld-musl-armhf.so.1
          mkdir -p $GITHUB_WORKSPACE/artifact
          cp out/Release/node $GITHUB_WORKSPACE/artifact/
          cp out/Release/ld-musl-armhf.so.1 $GITHUB_WORKSPACE/artifact/

      - uses: actions/upload-artifact@v4
        with:
          name: node-portable-dynamic
          path: artifact/
          retention-days: 7
